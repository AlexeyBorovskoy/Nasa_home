# NASA Home Cloud — goss infrastructure test spec
# Run: goss -g tests/goss/goss.yaml validate --format tap
# Install: curl -fsSL https://github.com/goss-org/goss/releases/download/v0.4.9/goss-linux-arm64 -o /usr/local/bin/goss && chmod +x /usr/local/bin/goss

port:
  tcp:8080:
    listening: true
    ip: ["0.0.0.0"]
  tcp:2283:
    listening: true
    ip: ["0.0.0.0"]
  tcp:8090:
    listening: true
    ip: ["0.0.0.0"]
  tcp:8099:
    listening: true
    ip: ["0.0.0.0"]
  tcp:19999:
    listening: true
    ip: ["0.0.0.0"]
  tcp:3001:
    listening: true
    ip: ["0.0.0.0"]
  tcp:9000:
    listening: true
    ip: ["0.0.0.0"]

service:
  docker:
    enabled: true
    running: true
  nasa-tunnel:
    enabled: true
    running: true
  NetworkManager:
    enabled: true
    running: true
  nasa-daily-report-telegram.timer:
    enabled: true
    running: true

file:
  /usr/local/sbin/nasa-daily-report.sh:
    exists: true
    mode: "0755"
  /usr/local/sbin/nasa-send-report-telegram.sh:
    exists: true
    mode: "0755"
  /etc/nasa-monitor/telegram.env:
    exists: true
  /etc/systemd/system/nasa-daily-report-telegram.timer:
    exists: true
  /etc/systemd/system/nasa-tunnel.service:
    exists: true
  /etc/iptables/rules.v4:
    exists: true
  /var/log/nasa-monitor:
    exists: true
    filetype: directory

http:
  http://localhost:2283/:
    status: 200
    timeout: 5000
  http://localhost:8090/health:
    status: 200
    timeout: 5000
  http://localhost:8099/healthcheck:
    status: 200
    timeout: 5000
  http://localhost:19999/:
    status: 200
    timeout: 5000

command:
  systemctl is-active nasa-tunnel:
    exit-status: 0
    stdout:
    - active
  systemctl is-active docker:
    exit-status: 0
    stdout:
    - active
