# smb.conf — native Samba config reference (for non-Docker deployment)
# Use configs/samba/config.yml for Docker (crazy-max/docker-samba) deployment.

[global]
   workgroup = WORKGROUP
   server string = NASA Home Cloud NAS on %h
   netbios name = jetson-nasa
   security = user
   map to guest = never
   server min protocol = SMB2
   smb ports = 445
   disable spoolss = yes
   load printers = no
   printing = bsd
   printcap name = /dev/null
   # NASA LAN-only: no internet exposure
   hosts allow = 192.168.0.0/24 127.0.0.1
   hosts deny = ALL

[nextcloud]
   comment = Nextcloud Files (read-only)
   path = /mnt/storage/nextcloud/data
   browseable = yes
   read only = yes
   guest ok = no
   valid users = nas
   follow symlinks = no
   wide links = no
   veto files = /.DS_Store/Thumbs.db/@eaDir/

[media]
   comment = Immich Library (read-only)
   path = /mnt/storage/immich/library
   browseable = yes
   read only = yes
   guest ok = no
   valid users = nas
   follow symlinks = no
   wide links = no

[public]
   comment = NASA Public NAS Share
   path = /mnt/storage/samba/public
   browseable = yes
   read only = no
   guest ok = no
   valid users = nas
   force user = nas
   create mask = 0664
   directory mask = 0775
   follow symlinks = no
   wide links = no