name: homecloud-coturn

# coturn — TURN/STUN server for Nextcloud Talk video calls outside LAN.
# Deploy on VPS (193.8.215.130), NOT on Jetson.
#
# USAGE on VPS:
#   cd ~/nasa/docker/compose
#   docker compose -f docker-compose.coturn.yml --env-file ../../config/.env up -d
#
# Ports (must be open in UFW on VPS):
#   3478/udp, 3478/tcp  — TURN/STUN
#   5349/udp, 5349/tcp  — TURNS (TLS)
#   49152-65535/udp     — media relay range

services:
  coturn:
    image: coturn/coturn:alpine
    container_name: homecloud_coturn
    restart: always
    mem_limit: 128m
    network_mode: host
    volumes:
      - ../../configs/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "turnutils_stunclient 127.0.0.1 || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
