name: homecloud-llm-gateway
services:
  llm-gateway:
    build:
      context: ../../services/llm-gateway
    container_name: homecloud_llm_gateway
    restart: always
    mem_limit: 256m
    ports:
      - "8090:8090"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL}
      DEEPSEEK_REASONER_MODEL: ${DEEPSEEK_REASONER_MODEL}
      LLM_DAILY_TOKEN_LIMIT: ${LLM_DAILY_TOKEN_LIMIT}
      LLM_REDACT_PERSONAL_DATA: ${LLM_REDACT_PERSONAL_DATA}
      LLM_LOG_PROMPTS: ${LLM_LOG_PROMPTS}
      LLM_LOG_RESPONSES: ${LLM_LOG_RESPONSES}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - homecloud_internal

networks:
  homecloud_internal:
    driver: bridge
