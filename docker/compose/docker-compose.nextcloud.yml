# Nextcloud-only compose for step-by-step deployment.
# Use after storage and network audit.
name: homecloud-nextcloud
services:
  nextcloud-db:
    image: postgres:16-alpine
    container_name: homecloud_nextcloud_db
    restart: always
    mem_limit: 256m
    environment:
      POSTGRES_DB: ${NEXTCLOUD_DB_NAME}
      POSTGRES_USER: ${NEXTCLOUD_DB_USER}
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
    volumes:
      - ${NEXTCLOUD_DB_DATA}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - homecloud_internal

  nextcloud-redis:
    image: redis:7-alpine
    container_name: homecloud_nextcloud_redis
    restart: always
    mem_limit: 64m
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - homecloud_internal

  nextcloud:
    image: nextcloud:apache
    container_name: homecloud_nextcloud
    restart: always
    mem_limit: 512m
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: ${NEXTCLOUD_DB_NAME}
      POSTGRES_USER: ${NEXTCLOUD_DB_USER}
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
      REDIS_HOST: nextcloud-redis
      REDIS_HOST_PASSWORD: ${REDIS_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${NEXTCLOUD_DATA}:/var/www/html/data
      - nextcloud_app:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost/status.php"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - homecloud_internal

volumes:
  nextcloud_app:

networks:
  homecloud_internal:
    driver: bridge
