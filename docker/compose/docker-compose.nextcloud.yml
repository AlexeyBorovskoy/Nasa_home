# Nextcloud-only compose for step-by-step deployment.
# Use after storage and network audit.
name: homecloud-nextcloud
services:
  nextcloud-db:
    image: postgres:16-alpine
    container_name: homecloud_nextcloud_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NEXTCLOUD_DB_NAME}
      POSTGRES_USER: ${NEXTCLOUD_DB_USER}
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
    volumes:
      - ${NEXTCLOUD_DB_DATA}:/var/lib/postgresql/data
    networks:
      - homecloud_internal

  nextcloud-redis:
    image: redis:7-alpine
    container_name: homecloud_nextcloud_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - homecloud_internal

  nextcloud:
    image: nextcloud:apache
    container_name: homecloud_nextcloud
    restart: unless-stopped
    depends_on:
      - nextcloud-db
      - nextcloud-redis
    ports:
      - "8080:80"
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: ${NEXTCLOUD_DB_NAME}
      POSTGRES_USER: ${NEXTCLOUD_DB_USER}
      POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_TRUSTED_DOMAINS}
      REDIS_HOST: nextcloud-redis
      REDIS_HOST_PASSWORD: ${REDIS_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${NEXTCLOUD_DATA}:/var/www/html/data
      - nextcloud_app:/var/www/html
    networks:
      - homecloud_internal

volumes:
  nextcloud_app:

networks:
  homecloud_internal:
    driver: bridge
