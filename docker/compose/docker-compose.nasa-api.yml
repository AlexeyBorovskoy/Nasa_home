name: homecloud-nasa-api
services:
  nasa-api:
    build:
      context: ../../services/nasa-api
    container_name: homecloud_nasa_api
    restart: always
    mem_limit: 128m
    ports:
      - "8099:8099"
    volumes:
      # Shared log directory — persists JSON logs on host
      - /var/log/nasa-monitor:/var/log/nasa-monitor
      # Docker socket — for `docker ps` inside container
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Report script — for POST /v1/report/now
      - /usr/local/sbin/nasa-send-report-telegram.sh:/usr/local/sbin/nasa-send-report-telegram.sh:ro
      - /etc/nasa-monitor:/etc/nasa-monitor:ro
    environment:
      API_LOG_LEVEL: ${NASA_API_LOG_LEVEL:-INFO}
      JWT_SECRET: ${NASA_API_JWT_SECRET}
      JWT_TTL_HOURS: ${NASA_API_JWT_TTL_HOURS:-24}
      NEXTCLOUD_INTERNAL_URL: ${NEXTCLOUD_INTERNAL_URL:-http://host.docker.internal:8080}
      EXPECTED_CONTAINERS: >-
        homecloud_nextcloud
        homecloud_nextcloud_db
        homecloud_nextcloud_redis
        homecloud_immich_server
        homecloud_immich_microservices
        homecloud_immich_db
        homecloud_immich_redis
        homecloud_llm_gateway
        homecloud_nasa_api
        homecloud_samba
        homecloud_netdata
        homecloud_uptime_kuma
        homecloud_portainer
      LOCAL_SERVICES: >-
        Nextcloud=http://192.168.0.50:8080/
        Immich=http://192.168.0.50:2283/
        LLM-Gateway=http://192.168.0.50:8090/health
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      TALK_FAMILY_ROOM: ${TALK_FAMILY_ROOM:-37pcobmf}
      IMMICH_API_KEY: ${IMMICH_API_KEY}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8099/healthcheck', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - homecloud_internal

networks:
  homecloud_internal:
    external: true
