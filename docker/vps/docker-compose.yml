name: nasa-vps

# Run on VPS, not on Jetson.
# Start: cd /opt/nasa && docker compose up -d
# Nginx listens on public ports and proxies to Jetson via SSH reverse tunnels.
# Jetson must run: scripts/network/setup_vps_tunnel.sh (or nasa-tunnel.service)

services:
  nginx:
    image: nginx:alpine
    container_name: nasa_nginx
    restart: always
    # host network required: SSH tunnel binds to 127.0.0.1 on the VPS host.
    # Bridge mode cannot reach the host's loopback — proxy_pass to 127.0.0.1:18080
    # would hit the container's own loopback instead of the tunnel endpoint.
    network_mode: host
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx

  # ---------------------------------------------------------------------------
  # Beszel Hub — централизованный мониторинг Jetson + VPS
  #
  # Доступ: http://193.8.215.130:8091
  # Данные: /opt/nasa/beszel-hub/data (SQLite, метрики, ключи)
  #
  # host network — обязателен: Hub коннектится к агенту Jetson через
  # SSH reverse tunnel на 127.0.0.1:45876 (Jetson nasa-tunnel.service).
  # ---------------------------------------------------------------------------
  beszel-hub:
    image: henrygd/beszel:latest
    container_name: beszel_hub
    restart: unless-stopped
    network_mode: host
    command: ["serve", "--http", "0.0.0.0:8091"]
    volumes:
      - ./beszel-hub/data:/beszel_data

volumes:
  nginx_logs: