# coturn — TURN server for Nextcloud Talk
# Deploy on VPS (193.8.215.130)
# Docs: https://github.com/coturn/coturn

# ── Network ───────────────────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349

# VPS external IP — update if VPS IP changes (or use DDNS hostname)
external-ip=193.8.215.130

# Media relay port range (must match UFW rules)
min-port=49152
max-port=65535

# ── Authentication ─────────────────────────────────────────────────────────────
# Shared secret auth (HMAC) — compatible with Nextcloud Talk
use-auth-secret
static-auth-secret=CHANGE_ME_GENERATE_WITH_openssl_rand_hex_32

realm=nasa.home

# ── Security ──────────────────────────────────────────────────────────────────
# Deny relay to private IP ranges (prevent SSRF)
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# ── Logging ───────────────────────────────────────────────────────────────────
log-file=/var/log/turnserver.log
simple-log
no-stdout-log
