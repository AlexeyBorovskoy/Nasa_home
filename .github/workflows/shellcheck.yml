name: Shellcheck

on:
  push:
    paths:
      - 'scripts/**'
      - 'systemd/**'
  pull_request:
    paths:
      - 'scripts/**'
      - 'systemd/**'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on all bash scripts
        run: |
          echo "=== Shellcheck results ==="
          find scripts/ -name "*.sh" -type f | sort | while read -r f; do
            echo "Checking: $f"
            shellcheck --severity=warning --shell=bash "$f" || true
          done
          echo ""
          echo "=== Summary (errors only) ==="
          find scripts/ -name "*.sh" -type f | \
            xargs shellcheck --severity=error --shell=bash --format=gcc 2>&1 | \
            grep -v "^$" || echo "No errors found."

      - name: Fail on shellcheck errors
        run: |
          find scripts/ -name "*.sh" -type f | \
            xargs shellcheck --severity=error --shell=bash
