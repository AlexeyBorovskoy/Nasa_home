name: Security Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-secrets:
    name: Check for secrets / Проверка секретов
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets
        run: bash scripts/security/check_no_secrets.sh
